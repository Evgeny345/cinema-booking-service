spring.application.name=CornCinema

spring.main.allow-bean-definition-overriding=true

spring.datasource.url=jdbc:postgresql://localhost:5432/cinema_corn
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=true

spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.add-mappings=true
spring.mvc.hiddenmethod.filter.enabled=true

upload_movie_poster.path=C:/Users/79040/posters
upload_qr_code.path=C:/Users/79040/users

#Time format hh:mm
cinema.openingTime=10:00
cinema.closingTime=02:00
cinema.intevalBetweenShowTimes=15

cinema.poster.height=500
cinema.poster.width=350



