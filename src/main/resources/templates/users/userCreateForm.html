<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="/css/form.css" rel="stylesheet">
</head>
<body style="background-color: #eee;">
    <div class="container">
        <div class="row justify-content-center my-5">
            <div class="col-md-6">
                <div class="card border-yellow">
                    <div class="card-header border-yellow">
                        <p class="text-center text-dark text-opacity-75 h2 mb-2 mx-1 mx-md-4 mt-4">Create profile</p>
                    </div>
                    <div class="card-body">
                        <form th:method="post" th:action="@{/users/createUser}" th:object="${user}" novalidate>
                            <div class="row mb-3">
                                <div class="col-md-2"></div>
                                <div class="col-md-8">
                                    <label for="userName" class="fw-semibold text-dark text-opacity-75 mb-1">User name:</label>
                                    <input class="form-control" type="text" th:field="*{userName}" id="userName" autocomplete="off">
                                    <p class="text-start fs-6 text-danger" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}">Name error</p>        
                                </div>
                                <div class="col-md-2"></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-2"></div>
                                <div class="col-md-8">
                                    <label for="email" class="fw-semibold text-dark text-opacity-75 mb-1">E-mail:</label>
                                    <input class="form-control" type="email" th:field="*{email}" id="email" autocomplete="off">
                                    <p class="text-start fs-6 text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Name error</p>        
                                </div>
                                <div class="col-md-2"></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-2"></div>
                                <div class="col-md-8">
                                    <label for="password" class="fw-semibold text-dark text-opacity-75 mb-1">Password:</label>
                                    <input class="form-control" type="password" th:field="*{password}" id="password">        
                                </div>
                                <div class="col-md-2"></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-2"></div>
                                <div class="col-md-8">
                                    <label for="confirmPassword" class="fw-semibold text-dark text-opacity-75 mb-1">Confirm password:</label>
                                    <input class="form-control" type="password" th:field="*{confirmPassword}" id="confirmPassword">
                                    <p class="text-start fs-6 text-danger" th:if="${#fields.hasErrors('global')}" th:errors="*{global}">Name error</p>        
                                </div>
                                <div class="col-md-2"></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-2"></div>
                                <div class="col-md-8">
                                    <div class="d-grid gap-2 px-0">
                                        <button class="btn btn-custom-warning" type="submit">Create</button>
                                    </div>
                                </div>
                                <div class="col-md-2"></div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-1.12.4.js"></script>
</body>
</html>
