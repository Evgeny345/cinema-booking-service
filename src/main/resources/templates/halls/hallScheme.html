<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${hall.name}">create film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="/css/hall.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="d-flex flex-row justify-content-evenly align-content-center">
        <div class="col-12 col-md-6 mt-5 pt-5">
            <p class="text-start h3 mb-5" th:text="${hall.name}">blue hall</p>
            <div style="height: 2em;"></div>
            <div class="row justify-content-md-between">
                <div class="col-2 col-md-2"></div>
                <div class="col-10 col-md-8 mb-5">
                    <div class="screen">screen</div>
                </div>
                <div class="col-md-2 d-none d-md-block"></div>
            </div>
            <div class="d-flex flex-row justify-content-between my-1" th:each="scheme : ${hall.seatsByRows}">
                <div class="col-2 col-md-3">
                    <div class="left-row" th:text="${scheme.key}">1</div>
                </div>
                <div class="col-10 col-md-6">
                    <div class="d-flex flex-row justify-content-center">
                        <div class="me-1" th:each="seat : ${scheme.value}">
                            <div th:class="${#strings.equalsIgnoreCase(seat.category, 'standart')} ? 'place-category-1' : 'place-category-2'" th:text="${seat.seatNumber}"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 d-none d-md-block">
                    <div class="d-flex justify-content-end">
                        <div class="right-row" th:text="${scheme.key}">1</div>
                    </div>
                </div>
            </div>
            <hr class="style3">
            <div class="d-flex justify-content-between justify-content-md-start">
                <div class="d-flex flex-row justify-content-start me-2" th:each="seatCategory : ${seatCategoryList}">
                    <div th:class="${#strings.equalsIgnoreCase(seatCategory.name, 'standart')} ? 'place-category-1' : 'place-category-2'"></div>
                    <div>
                        <p class="mt-1 ms-1" th:text="${seatCategory.name}"> - standart</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-1.12.4.js"></script>
</body>
</html>
