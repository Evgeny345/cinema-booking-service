<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies list</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="/css/form.css" rel="stylesheet">
    <link href="/css/schedule.css" rel="stylesheet">
</head>
<body style="background-color: #eee;">
<div class="container">
    <div class="container px-0">
    <nav th:fragment="adminHeader" class="navbar navbar-dark bg-dark navbar-expand-lg" style="background: rgba(193, 132, 27, 1);
	  background: linear-gradient(90deg,rgba(247, 212, 152, 1) 0%, rgba(193, 132, 27, 1) 0%, rgba(242, 219, 10, 1) 100%);">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img src="/img/corn-pic-black-bg-no.png" alt="Bootstrap" style="height: 48px;">
        </a>
    	<button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar" aria-label="Переключить навигацию">
      		<span class="navbar-toggler-icon"></span>
    	</button>
    	<div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar" aria-labelledby="offcanvasDarkNavbarLabel">
      		<div class="offcanvas-header">
        		<h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Menu</h5>
        		<button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
      		</div>
      		<div class="offcanvas-body">      
        		<div class="navbar-nav ms-auto">         
          			<div class="nav-item mb-sm-1 mb-lg-0">
            			<a class="py-0 my-0 ms-0 me-3 px-0 fs-5 link-body-emphasis link-opacity-50-hover link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 link-underline-opacity-50-hover d-none d-lg-block" th:href="@{/showTimes/admin/showTimeForm}">Show time form</a>
            			<a class="py-0 my-0 ms-0 me-3 px-0 link-light link-opacity-50 link-opacity-75-hover link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 link-underline-opacity-75-hover d-lg-none" th:href="@{/showTimes/admin/showTimeForm}">Show time form</a>
          			</div>
          			<div class="nav-item mb-sm-1 mb-lg-0">
            			<a class="py-0 my-0 ms-0 me-3 px-0 fs-5 link-body-emphasis link-opacity-50-hover link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 link-underline-opacity-50-hover d-none d-lg-block" th:href="@{/movies/admin/movieForm}">Movie form</a>
            			<a class="py-0 my-0 ms-0 me-3 px-0 link-light link-opacity-50 link-opacity-75-hover link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 link-underline-opacity-75-hover d-lg-none" th:href="@{/movies/admin/movieForm}">Movie form</a>
          			</div>
          			<div class="nav-item mb-sm-1 mb-lg-0">
            			<form th:action="@{/logout}" method="POST">
         					<button type="submit" class="btn btn-link py-0 my-0 mx-0 px-0 fs-5 link-body-emphasis link-opacity-50-hover link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 link-underline-opacity-50-hover d-none d-lg-block" aria-current="page">Log out</button>
                			<button type="submit" class="btn btn-link py-0 my-0 mx-0 px-0 link-light link-opacity-50 link-opacity-75-hover link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 link-underline-opacity-75-hover d-lg-none" aria-current="page">Log out</button>
            			</form>
          			</div>
        		</div>
      		</div>
    	</div>
    	</div>
  	</nav>
    </div>    
    <nav class="navbar sticky-top navbar-expand-lg bg-dark border-bottom border-bottom-dark pt-0 mb-5" data-bs-theme="dark" data-bs-toggle="popover">
    	<div class="container">
      		<div class="navbar-nav ms-auto">  	
      			<span class="navbar-text fs-5">
      				List of existing movies
    			</span>      	
      		</div>
    	</div>
  	</nav>
    
    <div class="row justify-content-center">
            <form th:method="post" th:action="@{/movies/admin/setUpMoviesToPlaying}" id="setUpInShowingAttrForm">
            </form>
            <div class="row row-cols-sm-1 row-cols-lg-2 gy-2 gx-2">
            <div class="row justify-content-center mb-2 border-bottom border-warning pe-5 me-2" th:each="film: ${moviesList}">              
                <div class="col-6 col-lg-5 mb-3">
                    <img th:src="${#strings.isEmpty(film.poster)} ? @{/img/corn-bg-blue.jpg} : @{${'/imgDB/' + #strings.replace(film.title, '&#32', '') + '/' + film.poster}}" class="image-fit-cover" th:alt="...">
                </div>
                <div class="col-6 col-lg-7">
                    <div class="row align-items-lg-start justify-content-between" style="height: 50%;">
                        <div class="col-6">
                            <p class="text-start text-dark text-opacity-75 h2 mb-5" th:text="${film.title}">Titanic</p>
                        </div>
                        <div class="col-6 text-end">
                            <div class="row justify-content-end">
                            <div class="col-4 pe-0">
                            <form th:method="get" th:action="@{/movies/admin/update/{filmId}(filmId=${film.id})}">
                            <button class="btn custom-icons-button" th:classappend="${film.showTimesAmountSinceDate>0}? 'disabled'" type="submit">
                                <div class="nav-link d-flex flex-column align-items-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                    <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/>
                                    </svg><span class="small">edit</span>
                                </div>
                            </button>
                            </form>
                            </div>
                            <div class="col-3 pe-0">
                            <form th:method="post" th:action="@{/movies/admin/delete/{filmId}(filmId=${film.id})}">
                            <button class="btn custom-icons-button px-0" th:classappend="${film.showTimesAmountSinceDate>0}? 'disabled'">
                                <div class="nav-link d-flex flex-column align-items-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                        <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                                        <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
                                    </svg><span class="small">delete</span>
                                </div>
                            </button>
                            </form>
                            </div>
                            </div>
                        </div>
                    </div>
                    <div class="row align-items-lg-end justify-content-between" style="height: 50%;">
                        <div class="col-lg-4 col-12">
                            <p class="fs-5">in showing now</p>
                        </div>
                        <div class="col-lg-8 col-12 text-lg-end ms-0 mb-2 pe-0">
                            <div class="custom-radio-group">
                                <div class="custom-radio-group-item">
                                    <input type="radio" form="setUpInShowingAttrForm" th:name="${film.id}" value="true" th:id="${'radio1' + film.id}" th:checked="${film.inPlayingNow} == true" th:disabled="${film.showTimesAmountSinceDate} &gt; 0">
                                    <label th:for="${'radio1' + film.id}">Yes</label>
                                </div>
                                <div class="custom-radio-group-item">
                                    <input type="radio" form="setUpInShowingAttrForm" th:name="${film.id}" value="false" th:id="${'radio2' + film.id}" th:checked="${film.inPlayingNow} == false" th:disabled="${film.showTimesAmountSinceDate} &gt; 0">
                                    <label th:for="${'radio2' + film.id}">No</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>             
        <div class="row my-4">     
           <div class="d-grid gap-2 px-0">
               <button class="btn btn-lg btn-custom-outline-warning" form="setUpInShowingAttrForm" type="submit" style="--bs-btn-bg: rgb(238, 238, 238)">Submit</button>
           </div>    
        </div>
        
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-1.12.4.js"></script>
<script>
    $(document).ready(function(){
        $('[data-bs-toggle="popover"]').popover({
            trigger: "hover",
            animation: false,
            placement: "right",
            content:"This list is for managment of movies. You can edit movie's parmeters and set up movie's availability to showing now. If the movie theater has any future show times with this movie it's impossible."

        });  
    });
</script>
<script>
$(".image-fit-cover").each(function(){
	let posterUrl = $(this).attr("src");
	$(this).load(posterUrl, function(response, status) {
        if (status !== 'success') {
        	$(this).attr("src","http://localhost:8080/img/corn-bg-yellow.jpg");
        }
    });
});
</script>
</body>
</html>
